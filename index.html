    .calendar-nav { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
    .nav-btn { background: #e5b839; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; }
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 6px 12px rgba(0,0,0,0.1); max-width: 900px; margin: 0 auto; }
    .day-header { background: #e9ecef; padding: 10px; text-align: center; font-weight: bold; color: #495057; }
    .day { min-height: 100px; border: 2px solid #dee2e6; padding: 8px; border-radius: 8px; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
    .day:hover { background: #f8f9fa; transform: scale(1.02); }
    .day.empty { background: #f8f9fa; cursor: default; }
    .day.has-events { border-color: #e5b839; }
    .day-number { font-weight: bold; font-size: 18px; margin-bottom: 5px; }
    .event { font-size: 12px; margin: 2px 0; padding: 2px 4px; background: #475f83; border-radius: 4px; color: white; }
    .events-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-width: 500px; max-height: 70vh; overflow-y: auto; z-index: 1000; display: none; }
    .close-popup { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #999; }
    .filter-bar { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
    .filter-select { padding: 8px 12px; margin: 0 5px; border: 1px solid #ddd; border-radius: 6px; }
    @media (max-width: 768px) { .calendar { grid-template-columns: repeat(4, 1fr); } }

	let currentDate = new Date();
  	  let filteredEvents = [...events];


    const monthNames = ['جانفي', 'فيفري', 'مارس', 'أفريل', 'ماي', 'جوان', 'جويلية', 'أوت', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];

    function generateCalendar() {
      const calendar = document.getElementById('calendarGrid');
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const today = new Date(year, month, 1);
      
      // رؤوس الأيام
      const days = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
      calendar.innerHTML = '';
      days.forEach(day => {
        const header = document.createElement('div');
        header.className = 'day-header';
        header.textContent = day;
        calendar.appendChild(header);
      });

      // أيام الشهر
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      // أيام فارغة قبل بداية الشهر
      for (let i = 0; i < firstDay; i++) {
        const emptyDay = document.createElement('div');
        emptyDay.className = 'day empty';
        calendar.appendChild(emptyDay);
      }

      // أيام الشهر
      for (let day = 1; day <= daysInMonth; day++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'day';
        dayDiv.innerHTML = `<div class="day-number">${day}</div>`;
        
        const dayEvents = filteredEvents.filter(e => {
          const eventDate = new Date(e.date);
          return eventDate.getFullYear() === year && eventDate.getMonth() === month && eventDate.getDate() === day;
        });

        if (dayEvents.length > 0) {
          dayDiv.classList.add('has-events');
          dayEvents.slice(0, 3).forEach(event => {
            const eventSpan = document.createElement('div');
            eventSpan.className = 'event';
            eventSpan.textContent = event.time + ' - ' + event.activity.slice(0, 25) + '...';
            dayDiv.appendChild(eventSpan);
          });
          if (dayEvents.length > 3) {
            const more = document.createElement('div');
            more.className = 'event';
            more.textContent = `+${dayEvents.length - 3} نشاط أخرى`;
            dayDiv.appendChild(more);
          }
          dayDiv.onclick = () => showEvents(dayEvents, `${day} ${monthNames[month]} ${year}`);
        }

        calendar.appendChild(dayDiv);
      }

      document.getElementById('currentMonth').textContent = `${monthNames[month]} ${year}`;
    }

    function prevMonth() {
      currentDate.setMonth(currentDate.getMonth() - 1);
      generateCalendar();
    }

    function nextMonth() {
      currentDate.setMonth(currentDate.getMonth() + 1);
      generateCalendar();
    }

    function updateCalendar() {
      const orgFilter = document.getElementById('filterOrg').value.toLowerCase();
      const placeFilter = document.getElementById('filterPlace').value.toLowerCase();
      
      filteredEvents = events.filter(e => 
        (!orgFilter || e.org.toLowerCase().includes(orgFilter)) &&
        (!placeFilter || e.place.toLowerCase().includes(placeFilter))
      );
      generateCalendar();
    }

    function showEvents(eventsList, dateTitle) {
      document.getElementById('popupTitle').textContent = `الفعاليات في ${dateTitle}`;
      const popupEvents = document.getElementById('popupEvents');
      popupEvents.innerHTML = '';
      
      eventsList.forEach(event => {
        const eventDiv = document.createElement('div');
        eventDiv.style = 'margin: 15px 0; padding: 15px; background: #f8f9fa; border-radius: 8px; border-right: 4px solid #4c6488;';
        eventDiv.innerHTML = `
          <strong>${event.time}</strong> - ${event.activity}<br>
          <small><b>تنظيم: </b>${event.org} |<b> المكان: </b>${event.place} |<b> طبيعة النشاط: </b>${event.type}</small>
        `;
        popupEvents.appendChild(eventDiv);
      });
      
      document.getElementById('eventsPopup').style.display = 'block';
    }

    function closePopup() {
      document.getElementById('eventsPopup').style.display = 'none';
    }

    // تهيئة الصفحة
    window.onload = function() {
      generateCalendar();
      // ملء الفلاتر
      const orgs = [...new Set(events.map(e => e.org))];
      const orgSelect = document.getElementById('filterOrg');
      orgs.forEach(org => {
        const option = document.createElement('option');
        option.value = org;
        option.textContent = org;
        orgSelect.appendChild(option);
      });
    };
  </script>
